        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

        .glass-sidebar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid #f1f5f9;
        }
    </style>
    <script>
      /**
       * RESILIENT ENVIRONMENT PROTECTION
       * Proactively shadows top/parent to avoid cross-origin Location access errors.
       */
      (function() {
        const isTopAccessible = () => {
          try { return !!window.top.location.href; } 
          catch (e) { return false; }
        };

        if (!isTopAccessible()) {
          try {
            Object.defineProperty(window, 'top', { get: function() { return window; }, configurable: true });
            Object.defineProperty(window, 'parent', { get: function() { return window; }, configurable: true });
          } catch (e) {
            // Fallback: manually trap errors on window object if defineProperty fails
            window.top = window;
            window.parent = window;
          }
        }

        // Global suppressor for lingering security exceptions
        window.addEventListener('error', function(e) {
          if (e.message && (
            e.message.includes('SecurityError') || 
            e.message.includes('Location') || 
            e.message.includes('cross-origin') ||
            e.message.includes('href')
          )) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        }, true);
      })();
    </script>
